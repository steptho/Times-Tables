<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grandson's Math Adventure</title>
    <link rel="icon" type="image/jpeg" href="icon.jpg?v=3">
    <link rel="apple-touch-icon" href="icon.jpg?v=3">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#e0f7fa">
    
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            background-color: #e0f7fa; 
            margin: 0; padding: 10px;
            touch-action: manipulation; 
            overflow-x: hidden;
        }
        .screen { display: none; }
        .active { display: block; }

        /* Menu Styles */
        .menu-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; max-width: 400px; margin: 10px auto;
        }
        .level-btn {
            padding: 15px; font-size: 20px; background: #0288d1;
            color: white; border: none; border-radius: 12px;
            box-shadow: 0 4px #01579b;
        }

        /* Game Elements */
        #score-bar { font-size: 22px; font-weight: bold; color: #00796b; margin-bottom: 5px; }
        
        #visual-box {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin: 10px auto; height: 230px; background: white; padding: 10px;
            border-radius: 15px; width: 92%; box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .row { display: flex; justify-content: center; width: 100%; }
        .dot { display: flex; justify-content: center; align-items: center; line-height: 1; transition: transform 0.2s; }
        
        #question { font-size: 45px; margin: 10px 0; font-weight: bold; color: #333; }
        
        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 400px; margin: 0 auto; }
        .answer-btn { padding: 20px; font-size: 26px; border-radius: 15px; border: none; background: #4caf50; color: white; box-shadow: 0 6px #2e7d32; cursor: pointer; }
        
        /* Sticker Section */
        #sticker-book {
            margin-top: 20px; padding: 10px; background: rgba(255,255,255,0.5);
            border-radius: 10px; min-height: 50px; font-size: 30px;
        }
        
        .back-btn { margin-top: 15px; background: #9e9e9e; font-size: 14px; padding: 10px; box-shadow: 0 3px #616161; width: 80%; color: white; border: none; border-radius: 10px; }

        /* Animations */
        @keyframes celebrate {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); color: gold; }
            100% { transform: scale(1); }
        }
        .animate-score { animation: celebrate 0.5s ease-in-out; }
    </style>
</head>
<body>

    <div id="menu-screen" class="screen active">
        <h1 style="color: #0277bd;">Choose a Table!</h1>
        <div class="menu-grid" id="menu-grid"></div>
        <div id="total-stars-menu" style="margin-top:20px; font-weight:bold;">Total ⭐: 0</div>
    </div>

    <div id="game-screen" class="screen">
        <div id="score-bar">⭐ Stars: <span id="star-count">0</span></div>
        <div id="visual-box"></div>
        <div id="question"></div>
        <div class="button-grid" id="options"></div>
        <div id="sticker-book"></div>
        <button class="back-btn" onclick="showMenu()">⬅ Back to Menu</button>
    </div>

    <script>
        // Audio Synth (Ding/Buzz)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // Game State
        let totalStars = parseInt(localStorage.getItem('mathStars')) || 0;
        let currentTable = 1;
        let currentAnswer = 0;

        // Rewards list
        const rewards = { 5:"🦖", 10:"🚀", 15:"🐶", 20:"🎨", 25:"🍦", 30:"🦁", 40:"🛸", 50:"👑", 75:"🐉", 100:"🏆" };

        function updateDisplay() {
            document.getElementById('star-count').innerText = totalStars;
            document.getElementById('total-stars-menu').innerText = "Total ⭐: " + totalStars;
            const book = document.getElementById('sticker-book');
            book.innerHTML = "";
            for (let goal in rewards) {
                if (totalStars >= goal) book.innerHTML += rewards[goal] + " ";
            }
        }

        // Initialize Menu
        const menuGrid = document.getElementById('menu-grid');
        for (let i = 1; i <= 12; i++) {
            const btn = document.createElement('button');
            btn.className = 'level-btn';
            btn.innerText = i;
            btn.onclick = () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                startLevel(i);
            };
            menuGrid.appendChild(btn);
        }
        updateDisplay();

        function startLevel(table) {
            currentTable = table;
            document.getElementById('menu-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            nextQuestion();
        }

        function showMenu() {
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('menu-screen').classList.add('active');
        }

        function nextQuestion() {
            const randomMultiplier = Math.floor(Math.random() * 12) + 1;
            currentAnswer = currentTable * randomMultiplier;
            document.getElementById('question').innerText = `${currentTable} × ${randomMultiplier}`;
            drawStars(currentTable, randomMultiplier);
            generateButtons(currentAnswer);
        }

        function drawStars(rows, cols) {
            const box = document.getElementById('visual-box');
            box.innerHTML = ''; 
            const starSize = Math.min(200 / rows, 280 / cols, 35); 
            for (let r = 0; r < rows; r++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                rowDiv.style.height = `${starSize}px`;
                for (let c = 0; c < cols; c++) {
                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    dot.style.width = `${starSize}px`;
                    dot.style.height = `${starSize}px`;
                    dot.style.fontSize = `${starSize * 0.8}px`;
                    dot.innerText = '⭐';
                    rowDiv.appendChild(dot);
                }
                box.appendChild(rowDiv);
            }
        }

        function generateButtons(correct) {
            const container = document.getElementById('options');
            container.innerHTML = '';
            let choices = [correct];
            while (choices.length < 4) {
                let wrong = correct + ( (Math.floor(Math.random() * 7) - 3) * currentTable );
                if (wrong === correct) wrong = correct + 1;
                if (wrong > 0 && !choices.includes(wrong)) choices.push(wrong);
            }
            choices.sort(() => Math.random() - 0.5);
            choices.forEach(val => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.innerText = val;
                btn.onclick = () => checkAnswer(val);
                container.appendChild(btn);
            });
        }

        function checkAnswer(picked) {
            if (picked === currentAnswer) {
                totalStars++;
                localStorage.setItem('mathStars', totalStars);
                playSound(523.25, 'sine', 0.2); // C5 note
                setTimeout(() => playSound(659.25, 'sine', 0.3), 100); // E5 note
                
                const scoreBar = document.getElementById('score-bar');
                scoreBar.classList.add('animate-score');
                setTimeout(() => scoreBar.classList.remove('animate-score'), 500);
                
                updateDisplay();
                nextQuestion();
            } else {
                playSound(150, 'sawtooth', 0.3); // Low buzz
                alert("Try counting the stars again!");
            }
        }
// This registers the offline helper
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
    </script>
</body>
</html>
