<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grandson's Math Adventure</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            background-color: #e0f7fa; 
            margin: 0; 
            padding: 10px;
            touch-action: manipulation; 
        }

        .screen { display: none; }
        .active { display: block; }

        /* Menu */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 400px;
            margin: 10px auto;
        }

        .level-btn {
            padding: 15px;
            font-size: 20px;
            background: #0288d1;
            color: white;
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px #01579b;
        }

        /* The Counting Area - Fixed Height to fit phone screens */
        #visual-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 10px auto;
            height: 250px; /* Limits the height so buttons stay visible */
            background: white;
            padding: 10px;
            border-radius: 15px;
            width: 90%;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .row { display: flex; justify-content: center; width: 100%; }
        
        /* The Star itself */
        .dot {
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1;
        }

        #question { font-size: 40px; margin: 10px 0; font-weight: bold; }
        
        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 400px; margin: 0 auto; }
        
        .answer-btn { padding: 20px; font-size: 24px; border-radius: 12px; border: none; background: #4caf50; color: white; box-shadow: 0 5px #2e7d32; }
        .back-btn { margin-top: 15px; background: #9e9e9e; font-size: 14px; padding: 10px; box-shadow: 0 3px #616161; width: 100%; }
    </style>
</head>
<body>

    <div id="menu-screen" class="screen active">
        <h1>Pick a Table!</h1>
        <div class="menu-grid" id="menu-grid"></div>
    </div>

    <div id="game-screen" class="screen">
        <div style="font-size: 20px;">⭐ Stars Won: <span id="star-count">0</span></div>
        
        <div id="visual-box"></div>

        <div id="question"></div>
        <div class="button-grid" id="options"></div>
        <button class="answer-btn back-btn" onclick="showMenu()">⬅ Back to Menu</button>
    </div>

    <script>
        let score = 0;
        let currentTable = 1;
        let currentAnswer = 0;

        const menuGrid = document.getElementById('menu-grid');
        for (let i = 1; i <= 12; i++) {
            const btn = document.createElement('button');
            btn.className = 'level-btn';
            btn.innerText = i;
            btn.onclick = () => startLevel(i);
            menuGrid.appendChild(btn);
        }

        function startLevel(table) {
            currentTable = table;
            document.getElementById('menu-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            nextQuestion();
        }

        function showMenu() {
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('menu-screen').classList.add('active');
        }

        function nextQuestion() {
            const randomMultiplier = Math.floor(Math.random() * 12) + 1;
            currentAnswer = currentTable * randomMultiplier;
            document.getElementById('question').innerText = `${currentTable} × ${randomMultiplier}`;
            
            drawStars(currentTable, randomMultiplier);
            generateButtons(currentAnswer);
        }

        function drawStars(rows, cols) {
            const box = document.getElementById('visual-box');
            box.innerHTML = ''; 

            // Calculate star size so they fit (Smaller numbers = Big stars, 12x12 = Tiny stars)
            // We use the box height (250px) and width (90%) to guestimate
            const starSize = Math.min(220 / rows, 300 / cols, 35); 

            for (let r = 0; r < rows; r++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                rowDiv.style.height = `${starSize}px`;
                
                for (let c = 0; c < cols; c++) {
                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    dot.style.width = `${starSize}px`;
                    dot.style.height = `${starSize}px`;
                    dot.style.fontSize = `${starSize * 0.8}px`;
                    dot.innerText = '⭐'; // Using a star emoji
                    rowDiv.appendChild(dot);
                }
                box.appendChild(rowDiv);
            }
        }

        function generateButtons(correct) {
            const container = document.getElementById('options');
            container.innerHTML = '';
            
            // Create a smart list of choices
            let choices = [correct, correct + currentTable, correct - currentTable, correct + 1];
            if (correct > 5) choices.push(correct - 1);
            
            choices = [...new Set(choices)].filter(v => v > 0); // Unique and positive
            choices.sort(() => Math.random() - 0.5);
            choices = choices.slice(0, 4); // Keep only 4 buttons

            choices.forEach(val => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.innerText = val;
                btn.onclick = () => checkAnswer(val);
                container.appendChild(btn);
            });
        }

        function checkAnswer(picked) {
            if (picked === currentAnswer) {
                score++;
                document.getElementById('star-count').innerText = score;
                nextQuestion();
            } else {
                alert("Not quite! Try counting the yellow stars.");
            }
        }
    </script>
</body>
</html>
